<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Страница не найдена</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#f7f9fb; color:#1f2d3d; margin:0; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:640px; width:100%; background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:28px; box-shadow:0 8px 24px rgba(30,58,95,.08); }
    h1 { margin:0 0 8px; color:#1e3a5f; font-size:1.5rem; }
    p { margin:0 0 12px; line-height:1.55; color:#5a6b7f; }
    a { color:#2bb3a3; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Страница не найдена</h1>
      <p id="msg">Запрошенная страница отсутствует.</p>
      <p><a href="/index.html">Вернуться на главную</a></p>
    </div>
  </div>
  <script>
    (function redirectDoctorFallback() {
      var path = (window.location.pathname || '').toLowerCase();
      var match = path.match(/\/vrachi\/([a-z0-9\-]+)\.html$/i);
      if (!match) return;

      var doctorId = match[1];
      var target = '/vrachi/template.html?id=' + encodeURIComponent(doctorId);
      var msg = document.getElementById('msg');
      if (msg) {
        msg.textContent = 'Статический профиль не найден. Выполняется переход на динамический шаблон…';
      }
      window.location.replace(target);
    })();
  </script>
</body>
</html>
