name: Extract ZIP Archive

on:
  push:
    branches:
      - main
    paths:
      - '*.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Find and extract ZIP archive
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "ZIP файл не найден"
            exit 1
          fi
          
          echo "Найден архив: $ZIP_FILE"
          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted/
          echo "Архив успешно распакован"
          ls -la extracted/
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit and push changes
        run: |
          git add extracted/
          
          if git diff --quiet --cached; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Extract website files from ZIP archive"
            git push origin main
          fi
